name: gcp-prod

on:
  workflow_run:
    workflows: ["gcp-test"]
    types: [completed]
  workflow_dispatch:
jobs:
  terraform:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: infra
    env:
      REGION: europe-west1
      GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
      CLOUDSDK_CORE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
      ENVIRONMENT: prod
      TF_VAR_environment: prod
      TF_VAR_project_level_environment: prod
      TF_VAR_database_id: production-restore-2026-07-01-08-59
      TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_production_alert_email: ${{ secrets.PRODUCTION_ALERT_EMAIL }}
      TF_VAR_create_default_firestore_database: 'false'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build cloud function sources and Dendrite static site
        working-directory: ./
        run: |
          npm ci
          npm run build:dendritestories-co-nz
          npm run build:cloud

      - name: Set up Google Cloud auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_PROJECT }}
          install_components: alpha

      - name: Log Google Cloud authentication details
        run: |
          gcloud auth list
          gcloud config list account
          gcloud config get-value project

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Cache Terraform plugin dir
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-plugins-${{ runner.os }}-${{ hashFiles('infra/**/.terraform.lock.hcl') }}

      - name: Terraform environment configuration
        run: |
          plugin_cache_dir="${HOME}/.terraform.d/plugin-cache"
          mkdir -p "$plugin_cache_dir"
          printf 'plugin_cache_dir = "%s"\n' "$plugin_cache_dir" > ~/.terraformrc

      - name: Terraform Init (Validate)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Init
        run: terraform init -migrate-state

      - name: Remove stale Firestore field state
        run: terraform state rm google_firestore_field.pages_all || true

      - name: Import existing Firestore database
        run: |
          database_resource="google_firestore_database.database[0]"
          database_path="projects/${GOOGLE_PROJECT}/databases/${TF_VAR_database_id}"

          if ! terraform state list | grep -Fxq "${database_resource}"; then
            terraform import -lock-timeout=5m "${database_resource}" "${database_path}"
          fi

          import_if_missing() {
            resource_name="$1"
            resource_id="$2"

            if ! terraform state list | grep -Fxq "$resource_name"; then
              terraform import -lock-timeout=5m "$resource_name" "$resource_id"
            fi
          }

          import_if_missing "google_firestore_index.variants_author_created[0]" "projects/${GOOGLE_PROJECT}/databases/${TF_VAR_database_id}/collectionGroups/variants/indexes/CICAgJiUpoMK"
          import_if_missing "google_firestore_index.variants_moderation_rand[0]" "projects/${GOOGLE_PROJECT}/databases/${TF_VAR_database_id}/collectionGroups/variants/indexes/CICAgJjF9oIK"
          import_if_missing "google_firestore_index.ratings_by_variant[0]" "projects/${GOOGLE_PROJECT}/databases/${TF_VAR_database_id}/collectionGroups/moderationRatings/indexes/CICAgOjXh4EK"

      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -lock-timeout=5m -auto-approve tfplan
